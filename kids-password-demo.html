<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stop the Sneaky Thief!</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
    background: linear-gradient(180deg, #FFE5B4 0%, #FFD1DC 60%, #B5DEFF 100%);
    text-align: center;
    color: #1f3a5f;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header { padding: 8px 20px 0; flex-shrink: 0; }
  h1 { font-size: 2.4em; margin: 0; text-shadow: 2px 2px 0 #fff; }
  .scene {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 10px 25px 15px;
    min-height: 0;
    gap: 12px;
  }
  .top-bar {
    position: fixed;
    top: 15px;
    right: 20px;
    z-index: 10;
  }
  .icon-btn {
    font-size: 1.6em;
    background: #fff;
    border: 3px solid #1f3a5f;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  }
  .progress-track {
    position: relative;
    height: 22vh;
    min-height: 140px;
    background: linear-gradient(to bottom, #FFF7DA 0%, #FFF7DA 65%, #C8E6C9 65%, #A5D6A7 100%);
    border-radius: 25px;
    margin: 0 auto;
    overflow: hidden;
    border: 5px dashed #95a5a6;
    max-width: 1200px;
    width: 100%;
    flex-shrink: 0;
  }
  .robot, .chest {
    position: absolute;
    bottom: 8%;
    font-size: clamp(60px, 13vh, 130px);
    line-height: 1;
    user-select: none;
    transform: translateX(-50%);
  }
  .robot { left: 8%; transition: left 0.6s ease; }
  .chest { left: 92%; }
  .game-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 15px;
    min-height: 0;
  }
  .row-top {
    display: flex;
    gap: 25px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }
  .round-label {
    font-size: 1.8em;
    font-weight: bold;
    padding: 8px 20px;
    border-radius: 14px;
    background: #fff;
  }
  .round-label.weak { color: #e74c3c; border: 3px solid #e74c3c; }
  .round-label.strong { color: #27ae60; border: 3px solid #27ae60; }
  .guesses-box {
    font-size: 1.8em;
    font-weight: bold;
    background: #fff5d6;
    border: 3px solid #f39c12;
    border-radius: 14px;
    padding: 8px 22px;
    color: #c0392b;
  }
  .guesses-box.safe { color: #27ae60; border-color: #27ae60; background: #e8f8ee; }
  .password-display {
    font-size: clamp(2.5em, 6.5vw, 5em);
    font-family: 'Courier New', monospace;
    font-weight: bold;
    letter-spacing: 0.2em;
    word-wrap: break-word;
    max-width: 100%;
    color: #1f3a5f;
  }
  .keyboard {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    flex-shrink: 0;
    max-width: 1200px;
    margin: 0 auto;
  }
  .key {
    width: 52px;
    height: 52px;
    font-size: 1.5em;
    font-weight: bold;
    border: 3px solid #1f3a5f;
    background: #fff;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .key:hover:not(:disabled) { background: #74b9ff; color: #fff; transform: scale(1.1); }
  .key:disabled { cursor: not-allowed; opacity: 0.4; }
  .key.correct { background: #2ecc71; color: #fff; border-color: #27ae60; }
  .key.wrong { background: #e74c3c; color: #fff; border-color: #c0392b; }
  .key-row-label {
    width: 100%;
    font-size: 1em;
    color: #7f8c8d;
    margin: 4px 0 2px;
  }
  .start-content, .end-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }
  .message {
    font-size: 1.6em;
    padding: 20px 30px;
    max-width: 900px;
    border-radius: 18px;
    line-height: 1.4;
  }
  .message.win { background: #2ecc71; color: #fff; }
  .message.lose { background: #e74c3c; color: #fff; }
  .message.lesson { background: #f39c12; color: #fff; }
  .big-button {
    font-size: 1.6em;
    padding: 18px 48px;
    border: none;
    border-radius: 50px;
    background: #3498db;
    color: #fff;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    font-family: inherit;
  }
  .big-button:hover { background: #2980b9; transform: scale(1.05); }
  .big-button.green { background: #27ae60; }
  .big-button.green:hover { background: #1e8449; }
  .hidden { display: none !important; }
  .shake { animation: shake 0.4s; }
  @keyframes shake {
    0%,100% { transform: translateX(-50%); }
    25% { transform: translateX(calc(-50% - 8px)); }
    75% { transform: translateX(calc(-50% + 8px)); }
  }
</style>
</head>
<body>

<div class="top-bar">
  <button id="music-btn" class="icon-btn" title="Music on/off">🔊</button>
</div>

<header><h1>🦹 Stop the Sneaky Thief!</h1></header>

<!-- START SCREEN -->
<div id="start-screen" class="scene">
  <div class="start-content">
    <p style="font-size:1.6em">A sneaky thief is trying to steal your password! 🎁</p>
    <p style="font-size:1.3em">Guess it first. Each wrong guess moves the thief closer!</p>
    <button class="big-button" onclick="startRound(1)">Start</button>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="scene hidden">
  <div class="progress-track" id="track">
    <div class="robot" id="robot">🦹</div>
    <div class="chest" id="chest">🎁</div>
  </div>
  <div class="game-info">
    <div class="row-top">
      <div class="round-label" id="round-label"></div>
      <div class="guesses-box" id="guesses-box"></div>
    </div>
    <div class="password-display" id="password-display"></div>
  </div>
  <div class="keyboard" id="keyboard"></div>
</div>

<!-- END SCREEN -->
<div id="end-screen" class="scene hidden">
  <div class="end-content">
    <div class="message" id="end-message"></div>
    <div class="message lesson" id="lesson"></div>
    <button class="big-button green" id="next-button"></button>
  </div>
</div>

<script>
  const ROUND1_POOL = ["password", "qwerty", "monkey", "dragon", "letmein", "hello", "football"];
  const ROUND2_POOL = ["K9!mZ@7p", "T4$bN!9w", "p7@Hq!3M", "B!8nQ@5z", "X3#tL!9v", "R6&jW!2k"];
  const MAX_WRONG = 8;
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];

  let currentRound = 1, currentPassword = "", guessed = new Set(), wrongGuesses = 0;

  const LETTERS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
  const NUMBERS = "0123456789".split("");
  const SYMBOLS = "!@#$%&*?".split("");

  function startRound(round) {
    currentRound = round;
    currentPassword = pick(round === 1 ? ROUND1_POOL : ROUND2_POOL);
    guessed = new Set();
    wrongGuesses = 0;

    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('end-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');

    const label = document.getElementById('round-label');
    label.textContent = round === 1 ? "Round 1: Weak" : "Round 2: Strong";
    label.className = 'round-label ' + (round === 1 ? 'weak' : 'strong');

    document.getElementById('chest').textContent = '🎁';
    document.getElementById('robot').style.left = '8%';
    document.getElementById('robot').classList.remove('shake');

    buildKeyboard();
    updateDisplay();
    startMusic();
  }

  function buildKeyboard() {
    const kb = document.getElementById('keyboard');
    kb.innerHTML = '';
    addKeys(kb, LETTERS);
    if (currentRound === 2) {
      addLabel(kb);
      addKeys(kb, NUMBERS);
      addKeys(kb, SYMBOLS);
    }
  }

  function addLabel(kb) {
    const l = document.createElement('div');
    l.className = 'key-row-label';
    l.textContent = '— numbers & symbols —';
    kb.appendChild(l);
  }

  function addKeys(kb, list) {
    list.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key';
      btn.textContent = k;
      btn.onclick = () => guess(k, btn);
      kb.appendChild(btn);
    });
  }

  function guess(ch, btn) {
    const key = ch.toLowerCase();
    if (guessed.has(key)) return;
    guessed.add(key);
    btn.disabled = true;

    if (currentPassword.toLowerCase().includes(key)) {
      btn.classList.add('correct');
      playTone(660, 0.15);
    } else {
      btn.classList.add('wrong');
      wrongGuesses++;
      moveRobot();
      playTone(180, 0.2);
    }
    updateDisplay();
    checkEnd();
  }

  function moveRobot() {
    const robot = document.getElementById('robot');
    const startPct = 8, endPct = 92;
    const pct = startPct + (wrongGuesses / MAX_WRONG) * (endPct - startPct);
    robot.style.left = pct + '%';
    robot.classList.add('shake');
    setTimeout(() => robot.classList.remove('shake'), 400);
  }

  function updateDisplay() {
    const display = currentPassword.split('').map(ch =>
      guessed.has(ch.toLowerCase()) ? ch : '_'
    ).join(' ');
    document.getElementById('password-display').textContent = display;

    const left = MAX_WRONG - wrongGuesses;
    const box = document.getElementById('guesses-box');
    box.textContent = '⏳ Guesses left: ' + left;
    box.classList.toggle('safe', left > 4);
  }

  function checkEnd() {
    const won = currentPassword.split('').every(ch => guessed.has(ch.toLowerCase()));
    const lost = wrongGuesses >= MAX_WRONG;
    if (won) setTimeout(() => showEnd(true), 500);
    else if (lost) {
      document.getElementById('chest').textContent = '💥';
      playTone(120, 0.6);
      setTimeout(() => showEnd(false), 1100);
    }
  }

  function showEnd(won) {
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('end-screen').classList.remove('hidden');

    const msg = document.getElementById('end-message');
    const lesson = document.getElementById('lesson');
    const next = document.getElementById('next-button');

    msg.className = 'message ' + (won ? 'win' : 'lose');
    msg.innerHTML = (won ? '🎉 You got it: ' : '🦹 Thief stole it! Password was: ') +
                    '<b>"' + currentPassword + '"</b>';

    if (currentRound === 1) {
      lesson.innerHTML = '⚠️ Real words are easy for hackers to guess. They try millions in seconds!';
      next.textContent = "Round 2 →";
      next.onclick = () => startRound(2);
    } else {
      lesson.innerHTML = '✅ Strong = <b>BIG letters + small letters + numbers + symbols.</b><br>' +
                         'Trick: turn a sentence into a password.<br>' +
                         '<i>"My dog Max ate 3 socks!"</i> → <b>MdMa3s!</b>';
      next.textContent = "Play Again";
      next.onclick = () => {
        document.getElementById('end-screen').classList.add('hidden');
        document.getElementById('start-screen').classList.remove('hidden');
      };
    }
  }

  // ===== Keyboard input =====
  document.addEventListener('keydown', (e) => {
    if (document.getElementById('game-screen').classList.contains('hidden')) return;
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    const input = e.key;
    if (input.length !== 1) return;
    const upper = input.toUpperCase();
    const buttons = document.querySelectorAll('.key');
    for (const btn of buttons) {
      if (btn.disabled) continue;
      if (btn.textContent === upper || btn.textContent === input) {
        btn.click();
        e.preventDefault();
        return;
      }
    }
  });

  // ===== Background music =====
  let audioCtx = null, musicOn = true, musicTimer = null, musicIndex = 0, musicPlaying = false;

  const N = { C4:261.63, D4:293.66, E4:329.63, F4:349.23, G4:392.00,
              A4:440.00, B4:493.88, C5:523.25, D5:587.33, E5:659.25 };

  // Cheerful arcade-style loop
  const melody = [
    [N.C4,0.25],[N.E4,0.25],[N.G4,0.25],[N.E4,0.25],
    [N.C5,0.25],[N.G4,0.25],[N.E4,0.25],[N.G4,0.25],
    [N.D4,0.25],[N.F4,0.25],[N.A4,0.25],[N.F4,0.25],
    [N.D5,0.25],[N.A4,0.25],[N.F4,0.25],[N.A4,0.25],
    [N.E4,0.25],[N.G4,0.25],[N.B4,0.25],[N.G4,0.25],
    [N.C4,0.5],[N.G4,0.5],[N.C5,0.5],
    [null,0.5]
  ];

  function ensureCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function playTone(freq, dur, vol=0.06) {
    if (!musicOn) return;
    ensureCtx();
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(vol, t + 0.02);
    gain.gain.setValueAtTime(vol, t + Math.max(dur - 0.05, 0.05));
    gain.gain.linearRampToValueAtTime(0, t + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + dur);
  }

  function nextNote() {
    if (!musicPlaying) return;
    const [freq, dur] = melody[musicIndex % melody.length];
    if (freq) playTone(freq, dur, 0.04);
    musicIndex++;
    musicTimer = setTimeout(nextNote, dur * 1000);
  }

  function startMusic() {
    if (!musicOn || musicPlaying) return;
    ensureCtx();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    musicPlaying = true;
    nextNote();
  }

  function stopMusic() {
    musicPlaying = false;
    clearTimeout(musicTimer);
  }

  document.getElementById('music-btn').addEventListener('click', () => {
    musicOn = !musicOn;
    document.getElementById('music-btn').textContent = musicOn ? '🔊' : '🔇';
    if (musicOn) startMusic(); else stopMusic();
  });
</script>
</body>
</html>
